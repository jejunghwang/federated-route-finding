version: 1

# Campus graph — 노드/엣지 단일 소스. 추가/수정은 이 파일만 편집.
# 광운대 캠퍼스 실제 8개 노드 (큰 장소). 실내 세부는 분류 대상이 아니라
# 데모 재생 단계에서 route_clips/indoor/ 영상으로 이어 붙인다.
nodes:
  - id: main_gate
    name: 정문
    building: 외부
    is_indoor: false
  - id: central_plaza
    name: 중앙광장
    building: 외부
    is_indoor: false
  - id: central_library
    name: 중앙도서관
    building: 중앙도서관
    is_indoor: false
  - id: fountain
    name: 분수대
    building: 외부
    is_indoor: false
  - id: outdoor_court
    name: 노천극장/농구장
    building: 외부
    is_indoor: false
  - id: saebit
    name: 새빛관
    building: 새빛관
    is_indoor: false
  - id: chambit
    name: 참빛관
    building: 참빛관
    is_indoor: false
  - id: bima_smoking
    name: 비마관흡연장
    building: 비마관
    is_indoor: false

# edges: 무방향. 한 번만 적으면 양방향으로 펼쳐짐.
edges:
  - [main_gate, central_plaza]
  - [main_gate, central_library]
  - [central_plaza, central_library]
  - [central_plaza, fountain]
  - [fountain, central_library]
  - [fountain, outdoor_court]
  - [fountain, saebit]
  - [fountain, bima_smoking]
  - [fountain, chambit]
  - [outdoor_court, saebit]
  - [saebit, chambit]
  - [chambit, bima_smoking]
